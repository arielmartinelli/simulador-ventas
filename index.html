<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Closers PRO</title>

<!-- 🔥 OPEN GRAPH (WhatsApp, LinkedIn, etc.) -->
<meta property="og:title" content="Closers PRO - Simulador de Ventas con IA">
<meta property="og:description" content="Entrená cierres reales con clientes que dudan, objetan y reaccionan como en la vida real.">
<meta property="og:image" content="https://i.postimg.cc/3w47hLtb/Chat-GPT-Image-27-mar-2026-12-49-53-p-m.png">
<meta property="og:url" content="https://tudominio.com">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://i.postimg.cc/3w47hLtb/Chat-GPT-Image-27-mar-2026-12-49-53-p-m.png">

<link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/zfm2L0zm/736e2537-f9ed-49b4-a84f-a4ee80260cfb.png">
<link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/zfm2L0zm/736e2537-f9ed-49b4-a84f-a4ee80260cfb.png">
<link rel="apple-touch-icon" href="https://i.postimg.cc/zfm2L0zm/736e2537-f9ed-49b4-a84f-a4ee80260cfb.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
body{
margin:0;
font-family:Inter;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
.header{
padding:20px;
display:flex;
justify-content:space-between;
}

/* STAGE */
.stage{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
}

.video-card{
width:700px;
height:55vh;
background:#1e293b;
border-radius:24px;
display:flex;
justify-content:center;
align-items:center;
}

/* AVATAR */
.avatar{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
}

.talking .avatar{
animation:glow 1s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 10px rgba(59,130,246,.3)}
100%{box-shadow:0 0 40px rgba(59,130,246,.8)}
}

/* CONTROLES (MEET STYLE ORIGINAL) */
.controls {
display:flex;
justify-content:center;
align-items:center;
gap:18px;
padding:30px;
}

.btn {
width:48px;
height:48px;
border-radius:50%;
background:rgba(30,41,59,0.8);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
color:white;
font-size:18px;
transition:.2s;
}

.btn:hover{
transform:scale(1.08);
}

.btn-talk{
width:64px;
height:64px;
background:#3b82f6;
font-size:22px;
}

.recording{
background:#ef4444;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}
70%{box-shadow:0 0 0 18px rgba(239,68,68,0)}
}

/* SCREENS */
.screen{
position:fixed;
inset:0;
background:#0f172a;
display:none;
padding:30px;
overflow:auto;
font-family:"JetBrains Mono";
z-index:999;
}

.close{
margin-top:20px;
padding:10px;
background:#1e293b;
border:none;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
<div>🎯 Closers PRO</div>
<div id="status">Listo</div>
</header>

<main class="stage">

<div id="leadName"></div>
<div id="leadDesc"></div>

<div id="avatarWrap" class="video-card">
<div class="avatar">
<img id="avatarImg">
</div>
</div>

</main>

<footer class="controls">

<div class="btn" onclick="reset()">
<i class="ph ph-arrow-counter-clockwise"></i>
</div>

<div onclick="toggleLive()" id="talkBtn" class="btn btn-talk">
<i id="micIcon" class="ph-fill ph-microphone"></i>
</div>

<div class="btn" onclick="abrirTrans()">
<i class="ph ph-text-align-left"></i>
</div>

<div class="btn" onclick="abrirAudit()">
<i class="ph ph-chart-line-up"></i>
</div>

</footer>

<!-- TRANS -->
<div id="transScreen" class="screen">
<h2>Transcripción</h2>
<div id="transContent"></div>
<button class="close" onclick="cerrar('transScreen')">Volver</button>
</div>

<!-- AUDIT -->
<div id="auditScreen" class="screen">
<h2>Auditoría</h2>
<pre id="auditContent"></pre>
<button class="close" onclick="cerrar('auditScreen')">Volver</button>
</div>

<script>
let historial = [];
let escuchando = false;
let hablandoIA = false;

avatarImg.src=`https://api.dicebear.com/7.x/notionists/svg?seed=${Math.random()}`;

// LEAD
async function generarLead(){
const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"/start"})
});
const data = await res.json();

leadName.innerText = data.name;
leadDesc.innerText = data.desc;
}
generarLead();

// VOZ CONTINUA
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang="es-AR";
rec.continuous=true;

function toggleLive(){
if(!escuchando){
rec.start();
escuchando=true;
status.innerText="Escuchando...";
}else{
rec.stop();
speechSynthesis.cancel();
escuchando=false;
status.innerText="Pausado";
}
}

rec.onresult = async (e) => {

const text = e.results[e.results.length-1][0].transcript;

if(hablandoIA){
speechSynthesis.cancel();
avatarWrap.classList.remove("talking");
hablandoIA=false;
}

historial.push({role:"user",text});

const res = await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data = await res.json();

historial.push({role:"lead",text:data.reply});

hablarIA(data.reply, data.emocion);
};

function hablarIA(texto, emocion){

let u = new SpeechSynthesisUtterance(texto);
hablandoIA=true;

if(emocion==="enojo"){u.rate=1.1;u.pitch=0.8;}
if(emocion==="duda"){u.rate=0.9;u.pitch=1.1;}

avatarWrap.classList.add("talking");

u.onend=()=>{
avatarWrap.classList.remove("talking");
hablandoIA=false;
};

speechSynthesis.speak(u);
}

async function reset(){
historial=[];
await generarLead();
}

// TRANS
function abrirTrans(){
document.getElementById("transScreen").style.display="block";
document.getElementById("transContent").innerHTML=
historial.map(m=>`<div>${m.role==="user"?"TÚ":"LEAD"}: ${m.text}</div>`).join("");
}

// AUDIT
async function abrirAudit(){
const r=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"/audit"})
});
const d=await r.json();

document.getElementById("auditScreen").style.display="block";
document.getElementById("auditContent").innerText=d.reply;
}

// 🔥 FIX VOLVER (CLAVE)
function cerrar(id){
document.getElementById(id).style.display="none";
}
</script>

</body>
</html>

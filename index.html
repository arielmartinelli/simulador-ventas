<script>
const btn = document.getElementById("talk");
const status = document.getElementById("status");
const avatar = document.getElementById("avatar");
const avatarImg = document.querySelector("#avatar img");
const subtitlesContent = document.getElementById("subtitles-content");

let speaking = false;

// 🎲 Avatar random
function randomAvatar() {
    const gender = Math.random() > 0.5 ? "men" : "women";
    const id = Math.floor(Math.random() * 99);
    avatarImg.src = `https://randomuser.me/api/portraits/${gender}/${id}.jpg`;
}
randomAvatar();

// 🎤 Speech
const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new Recognition();
rec.lang = "es-AR";

btn.onclick = () => {
    rec.start();
    status.innerText = "Escuchando...";
};

rec.onresult = async (event) => {
    const text = event.results[0][0].transcript;

    mostrarSubtitulo("Tú: " + text);
    status.innerText = "Procesando...";

    try {
        const res = await fetch("/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        const respuesta = data.reply || "Error en respuesta";

        mostrarSubtitulo("Lead: " + respuesta);

        if (data.audio) {
            reproducirAudio(data.audio);
        } else {
            status.innerText = "Tu turno";
        }

    } catch (err) {
        console.error(err);
        mostrarSubtitulo("Error de conexión");
        status.innerText = "Error";
    }
};

// 🎬 SUBTÍTULOS PRO
function mostrarSubtitulo(text) {
    const line = document.createElement("div");
    line.className = "subtitle-line active";
    line.innerText = text;

    const all = subtitlesContent.querySelectorAll(".subtitle-line");
    all.forEach(el => el.classList.remove("active"));

    subtitlesContent.appendChild(line);

    const total = subtitlesContent.children.length;

    if (total > 4) {
        const offset = (total - 4) * 30;
        subtitlesContent.style.transform = `translateY(-${offset}px)`;
    }

    if (total > 10) {
        subtitlesContent.removeChild(subtitlesContent.firstChild);
    }
}

// 🔊 AUDIO REAL
function reproducirAudio(base64Audio) {
    const audio = new Audio("data:audio/mp3;base64," + base64Audio);

    speaking = true;
    avatar.classList.add("talking");
    status.innerText = "Lead hablando...";

    audio.play();

    audio.onended = () => {
        avatar.classList.remove("talking");
        speaking = false;
        status.innerText = "Tu turno";
    };
}

// ⏸️
function pausarLead() {
    speechSynthesis.cancel();
    avatar.classList.remove("talking");
    speaking = false;
    status.innerText = "Pausado";
}

// 🔄 RESET
async function resetChat() {
    await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: "/reset" })
    });

    // limpiar historial visual SIN romper estructura
    subtitlesContent.innerHTML = "";
    mostrarSubtitulo("Nueva simulación iniciada...");

    randomAvatar();
    status.innerText = "Listo";
}

// 📊 AUDITORÍA
async function auditar() {
    status.innerText = "Analizando...";

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: "/audit" })
    });

    const data = await res.json();

    mostrarSubtitulo("📊 " + (data.reply || "Error"));
    status.innerText = "Auditoría lista";
}
</script>

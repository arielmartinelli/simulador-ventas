<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador Closers Pro</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1e293b, #020617);
    font-family: sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    background: rgba(0,0,0,0.4);
    font-weight: bold;
    backdrop-filter: blur(10px);
}

/* VIDEO */
.video-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* AVATAR */
.avatar {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(59,130,246,0.5);
    transition: 0.2s;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* HABLANDO */
.talking {
    animation: pulse 0.6s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* SUBTÍTULOS */
.subtitles {
    position: absolute;
    bottom: 30px;
    width: 70%;
    height: 120px;
    overflow: hidden;
    background: rgba(0,0,0,0.6);
    border-radius: 12px;
    padding: 10px;
    backdrop-filter: blur(8px);
}

/* CONTENEDOR INTERNO */
#subtitles-content {
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.4s ease;
}

/* CADA MENSAJE */
.subtitle-line {
    font-size: 18px;
    opacity: 0.4;
    transform: translateY(10px);
    transition: all 0.4s ease;
}

/* MENSAJE ACTUAL */
.subtitle-line.active {
    font-size: 22px;
    opacity: 1;
    transform: translateY(0);
    font-weight: bold;
}

/* CONTROLES */
.controls {
    padding: 20px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    padding: 14px 24px;
    font-size: 16px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    color: white;
}

button:hover {
    transform: scale(1.05);
}

.status {
    text-align: center;
    padding-bottom: 10px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">🎯 Simulación en Vivo</div>

<div class="video-container">
    <div id="avatar" class="avatar">
        <img src="https://randomuser.me/api/portraits/lego/1.jpg">
    </div>
    <div id="subtitles" class="subtitles">
    <div id="subtitles-content"></div>
</div>
</div>

<div class="controls">
    <button id="talk">🎙️ Hablar</button>
    <button onclick="resetChat()">🔄 Reset</button>
    <button onclick="pausarLead()">⏸️ Pausar</button>
    <button onclick="auditar()">📊 Auditoría</button>
</div>

<div id="status" class="status">Listo</div>

<script>
const btn = document.getElementById("talk");
const status = document.getElementById("status");
const subtitles = document.getElementById("subtitles");
const avatar = document.getElementById("avatar");
const avatarImg = document.querySelector("#avatar img");

let speaking = false;

// 🎲 Avatar random
function randomAvatar() {
    const gender = Math.random() > 0.5 ? "men" : "women";
    const id = Math.floor(Math.random() * 99); // 0–99
    avatarImg.src = `https://randomuser.me/api/portraits/${gender}/${id}.jpg`;
}
randomAvatar();

// 🎤 Speech
const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const rec = new Recognition();
rec.lang = "es-AR";

btn.onclick = () => {
    rec.start();
    status.innerText = "Escuchando...";
};

rec.onresult = async (event) => {
    const text = event.results[0][0].transcript;

    mostrarSubtitulo("Tú: " + text);
    status.innerText = "Procesando...";

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    if (data.audio) {
        mostrarSubtitulo(data.text);
        reproducirAudio(data.audio);
    } else {
        mostrarSubtitulo(data.text);
        status.innerText = "Listo";
    }
};

// 🎬 subtítulo tipo película
const subtitlesContent = document.getElementById("subtitles-content");

function mostrarSubtitulo(text) {
    // crear nueva línea
    const line = document.createElement("div");
    line.className = "subtitle-line active";
    line.innerText = text;

    // quitar active a anteriores
    const all = subtitlesContent.querySelectorAll(".subtitle-line");
    all.forEach(el => el.classList.remove("active"));

    subtitlesContent.appendChild(line);

    // scroll automático hacia arriba
    const totalLines = subtitlesContent.children.length;

    if (totalLines > 4) {
        const offset = (totalLines - 4) * 28;
        subtitlesContent.style.transform = `translateY(-${offset}px)`;
    }

    // eliminar líneas viejas (performance)
    if (totalLines > 10) {
        subtitlesContent.removeChild(subtitlesContent.firstChild);
    }
}

// 🔊 AUDIO REAL
function reproducirAudio(base64Audio) {
    const audio = new Audio("data:audio/mp3;base64," + base64Audio);

    speaking = true;
    avatar.classList.add("talking");
    status.innerText = "Lead hablando...";

    audio.play();

    audio.onended = () => {
        avatar.classList.remove("talking");
        speaking = false;
        status.innerText = "Tu turno";
    };
}

// ⏸️
function pausarLead() {
    speechSynthesis.cancel();
    avatar.classList.remove("talking");
    speaking = false;
    status.innerText = "Pausado";
}

// 🔄 RESET
async function resetChat() {
    await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: "/reset" })
    });

    subtitles.innerText = "Nueva simulación...";
    randomAvatar();
}

// 📊 AUDITORÍA
async function auditar() {
    status.innerText = "Analizando...";

    const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: "/audit" })
    });

    const data = await res.json();

    mostrarSubtitulo(data.text);
    status.innerText = "Auditoría lista";
}

async function enviarMensaje() {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      message: "Hola, quiero vender un producto"
    }),
  });

  const data = await res.json();
  console.log(data.reply);
}
</script>

</body>
</html>

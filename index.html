<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Closers PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
:root{
--bg:#0f172a;
--surface:#1e293b;
--primary:#3b82f6;
--danger:#ef4444;
--text:#f8fafc;
--muted:#94a3b8;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */
.header{
padding:20px;
display:flex;
justify-content:space-between;
}

/* LEAD INFO */
.lead-card{
text-align:center;
margin-bottom:10px;
}

.lead-name{
font-size:18px;
font-weight:600;
}

.lead-desc{
font-size:13px;
color:var(--muted);
margin-top:5px;
}

/* STAGE */
.stage{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.video-card{
width:700px;
height:55vh;
background:#1e293b;
border-radius:24px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* AVATAR */
.avatar{
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
}

.talking .avatar{
animation:glow 1s infinite alternate;
}

@keyframes glow{
0%{box-shadow:0 0 10px rgba(59,130,246,.3)}
100%{box-shadow:0 0 40px rgba(59,130,246,.8)}
}

/* SUB */
.sub{
position:absolute;
bottom:40px;
background:rgba(0,0,0,.6);
padding:10px 20px;
border-radius:10px;
opacity:0;
transition:.3s;
}
.show{opacity:1}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
gap:20px;
padding:20px;
}

.btn{
width:60px;
height:60px;
border-radius:50%;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.talk{background:var(--primary)}
.recording{background:var(--danger)}

/* SCREENS */
.screen{
position:fixed;
inset:0;
background:#0f172a;
display:none;
padding:30px;
overflow:auto;
font-family:"JetBrains Mono";
}
</style>
</head>

<body>

<header class="header">
<div>🎯 Closers PRO</div>
<div id="status">Listo</div>
</header>

<main class="stage">

<div class="lead-card">
<div id="leadName" class="lead-name"></div>
<div id="leadDesc" class="lead-desc"></div>
</div>

<div id="avatarWrap" class="video-card">
<div class="avatar">
<img id="avatarImg">
</div>
</div>

<div id="sub" class="sub"></div>

</main>

<footer class="controls">
<div class="btn" onclick="reset()">🔄</div>
<div id="talkBtn" class="btn talk">🎤</div>
<div class="btn" onclick="trans()">📝</div>
<div class="btn" onclick="audit()">📊</div>
</footer>

<div id="transScreen" class="screen"></div>
<div id="auditScreen" class="screen"></div>

<script>
let historial=[];

// avatar
avatarImg.src=`https://api.dicebear.com/7.x/notionists/svg?seed=${Math.random()}`;

// generar lead en pantalla
async function generarLeadUI(){
const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"/start"})
});
const data=await res.json();

leadName.innerText=data.name;
leadDesc.innerText=data.desc;
}

generarLeadUI();

// voz
const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
rec.lang="es-AR";

talkBtn.onclick=()=>{
rec.start();
talkBtn.classList.add("recording");
status.innerText="Escuchando...";
};

rec.onend=()=>{
talkBtn.classList.remove("recording");
};

rec.onresult=async e=>{
const text=e.results[0][0].transcript;

historial.push({role:"user",text});
mostrar("Tú: "+text);

status.innerText="Pensando...";

const res=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data=await res.json();

historial.push({role:"lead",text:data.reply});
mostrar("Lead: "+data.reply);
hablar(data.reply);
};

function mostrar(t){
sub.innerText=t;
sub.classList.add("show");
setTimeout(()=>sub.classList.remove("show"),5000);
}

function hablar(t){
let u=new SpeechSynthesisUtterance(t);

avatarWrap.classList.add("talking");
status.innerText="Lead hablando...";

u.onend=()=>{
avatarWrap.classList.remove("talking");
status.innerText="Tu turno";
};

speechSynthesis.speak(u);
}

// reset
async function reset(){
historial=[];
await generarLeadUI();
status.innerText="Nuevo lead generado";
}

// trans
function trans(){
transScreen.style.display="block";
transScreen.innerHTML="<h2>Transcripción</h2>"+historial.map(m=>
`<div>${m.role==="user"?"TÚ":"LEAD"}: ${m.text}</div>`
).join("");
}

// audit
async function audit(){
const r=await fetch("/api/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:"/audit"})
});
const d=await r.json();

auditScreen.style.display="block";
auditScreen.innerHTML="<h2>Auditoría</h2><pre>"+d.reply+"</pre>";
}
</script>

</body>
</html>

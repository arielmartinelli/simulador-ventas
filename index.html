<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closers PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<style>
/* 🔹 TODO TU CSS ORIGINAL intacto */
body { margin:0; font-family:Inter; background:#0f172a; color:white }

/* NUEVAS PANTALLAS */
.screen { display:none; height:100vh; }
.active { display:flex; flex-direction:column }

/* FORM */
.form-box {
    margin:auto;
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:320px;
}

select, button {
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    border:none;
}

button { background:#3b82f6; color:white; cursor:pointer }
</style>
</head>

<body>

<!-- 🧠 PANTALLA 1: CONFIG -->
<div id="configScreen" class="screen active">
    <div class="form-box">
        <h2>Configurar Lead</h2>

        <label>Perfil</label>
        <select id="perfil">
            <option>ZAFIRO</option>
            <option>PERLA</option>
            <option>ESMERALDA</option>
            <option>RUBÍ</option>
        </select>

        <label>Objeción principal</label>
        <select id="objecion">
            <option>precio</option>
            <option>tiempo</option>
            <option>confianza</option>
            <option>experiencias pasadas</option>
        </select>

        <label>Dificultad</label>
        <select id="dificultad">
            <option value="60">60%</option>
            <option value="70">70%</option>
            <option value="80">80%</option>
            <option value="90">90%</option>
        </select>

        <button onclick="iniciarSimulacion()">Iniciar</button>
    </div>
</div>

<!-- 🎭 PANTALLA 2: SIMULADOR (TU UI ORIGINAL) -->
<div id="simScreen" class="screen">

<header class="header">
    <div>Closers PRO</div>
    <div id="statusBadge">Listo</div>
</header>

<main>
    <img id="avatarImg" width="120">
    <div id="subtitles"></div>
</main>

<footer>
    <button onclick="resetChat()">Reset</button>
    <button id="talkBtn">Hablar</button>
    <button onclick="verTranscripcion()">Transcripción</button>
    <button onclick="verAuditoria()">Auditoría</button>
</footer>

</div>

<!-- 📝 PANTALLA 3: TRANSCRIPCIÓN -->
<div id="transScreen" class="screen">
    <h2>Transcripción</h2>
    <pre id="transcripcion"></pre>
    <button onclick="volver()">Volver</button>
</div>

<!-- 📊 PANTALLA 4: AUDITORÍA -->
<div id="auditScreen" class="screen">
    <h2>Auditoría</h2>
    <pre id="audit"></pre>
    <button onclick="volver()">Volver</button>
</div>

<script>
let config = {};
let historial = [];

// 🎬 CAMBIAR PANTALLAS
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// 🚀 INICIO
async function iniciarSimulacion(){
    config = {
        perfil: document.getElementById("perfil").value,
        objecion: document.getElementById("objecion").value,
        dificultad: document.getElementById("dificultad").value
    };

    await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:"/start", config})
    });

    show("simScreen");
}

// 🎤 SIMPLIFICADO
document.getElementById("talkBtn").onclick = async ()=>{
    const texto = prompt("Decí algo:");
    if(!texto) return;

    historial.push("TÚ: "+texto);

    const res = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:texto})
    });

    const data = await res.json();

    historial.push("LEAD: "+data.reply);

    document.getElementById("subtitles").innerText = data.reply;
};

// 🔄 RESET
async function resetChat(){
    historial=[];
    await fetch("/api/chat",{method:"POST",body:JSON.stringify({message:"/reset"})});
}

// 📝 TRANSCRIPCIÓN
function verTranscripcion(){
    document.getElementById("transcripcion").innerText = historial.join("\n\n");
    show("transScreen");
}

// 📊 AUDIT
async function verAuditoria(){
    const res = await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:"/audit"})
    });

    const data = await res.json();
    document.getElementById("audit").innerText = data.reply;

    show("auditScreen");
}

function volver(){
    show("simScreen");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Simulator Pro | Command Center</title>

    <!-- SEO & Meta -->
    <meta property="og:title" content="Sales Simulator Pro | IA Training">
    <meta property="og:image" content="/og-image.png">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/zfm2L0zm/736e2537-f9ed-49b4-a84f-a4ee80260cfb.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-main: #020617; /* Deepest blue/black */
            --bg-card: rgba(15, 23, 42, 0.6);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.05);
            --sidebar-width: 320px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr var(--sidebar-width);
            grid-template-rows: 1fr auto;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        /* --- LEFT SIDEBAR --- */
        .sidebar-left {
            grid-row: 1 / 3;
            border-right: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            gap: 1.5rem;
        }

        .bio-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .bio-card h2 { font-size: 1.25rem; margin-bottom: 0.5rem; color: var(--accent); }
        .bio-card p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; }

        .transcript-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        .transcript-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.1em; }

        #transContent {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-right: 0.5rem;
        }

        #transContent::-webkit-scrollbar { width: 4px; }
        #transContent::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

        /* --- MAIN CENTER --- */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .hud-video-box {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 16/10;
            background: var(--bg-card);
            border-radius: 32px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 0 50px -10px var(--accent-glow);
        }

        /* HUD Graphics */
        .hud-bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent);
            opacity: 0.4;
        }
        .tl { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .tr { top: 20px; right: 20px; border-left: 0; border-bottom: 0; }
        .bl { bottom: 20px; left: 20px; border-right: 0; border-top: 0; }
        .br { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(to bottom, transparent, rgba(59, 130, 246, 0.1), transparent);
            animation: scan 8s linear infinite;
            z-index: 5;
        }

        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        .avatar-wrap {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            padding: 6px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            position: relative;
            z-index: 10;
            transition: transform 0.4s ease;
        }
        .avatar-wrap.talking { animation: talking-pulse 1.5s infinite; }
        .avatar-wrap.paused { filter: grayscale(1) blur(2px) contrast(0.8); }

        @keyframes talking-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px 10px var(--accent-glow); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
        }

        .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #0f172a; border: 4px solid #020617; overflow: hidden; }
        .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

        /* Floating Controls */
        .floating-controls {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1.5rem;
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 99px;
            border: 1px solid var(--glass-border);
            z-index: 100;
        }

        .btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
        .btn.active { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-glow); }
        .btn.danger { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.4); color: #ef4444; }
        .btn.danger:hover { background: #ef4444; color: white; }

        /* --- RIGHT SIDEBAR (METRICS) --- */
        .sidebar-right {
            border-left: 1px solid var(--glass-border);
            background: rgba(2, 6, 23, 0.4);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .metric-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .metric-title { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em; }

        .progress-circle-wrap { width: 140px; height: 140px; margin: 0 auto; position: relative; }
        .progress-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: var(--glass-border); stroke-width: 8; }
        .circle-bar { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 0.8s ease-out; }

        .progress-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .mood-tag {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid var(--accent-glow);
        }

        .eranc-meter {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            background: #020617;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .eranc-dot {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            transition: 0.3s;
        }
        .eranc-dot.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }

        /* --- SCREENS --- */
        .screen {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(32px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 4rem;
        }

        .config-box { max-width: 800px; width: 100%; }
        #configScreen { display: flex; } /* Initial */

        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; }
        .config-card { background: var(--bg-card); padding: 2rem; border-radius: 24px; border: 1px solid var(--glass-border); }
        .config-card h3 { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
        select { width: 100%; background: #020617; color: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); outline: none; }

        .btn-start { width: 100%; padding: 1.5rem; background: var(--accent); border: none; border-radius: 16px; color: white; font-weight: 700; font-size: 1.2rem; cursor: pointer; margin-top: 2rem; }

        .chat-bubble { padding: 1rem; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; animation: slideIn 0.3s ease-out; }
        .bubble-user { background: var(--accent); color: white; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
        .bubble-lead { background: var(--bg-card); border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- LEFT SIDE -->
    <aside class="sidebar-left">
        <div class="bio-card">
            <h2 id="leadName">--</h2>
            <p id="leadDesc">Selecciona un perfil para comenzar el entrenamiento...</p>
        </div>

        <div class="transcript-wrap">
            <div class="transcript-title">Transcripción en vivo</div>
            <div id="transContent"></div>
        </div>
    </aside>

    <!-- CENTER -->
    <main class="main-stage">
        
        <div class="hud-video-box">
            <div class="hud-bracket tl"></div>
            <div class="hud-bracket tr"></div>
            <div class="hud-bracket bl"></div>
            <div class="hud-bracket br"></div>
            <div class="scan-line"></div>
            
            <div id="avatarWrap" class="avatar-wrap">
                <div class="avatar-inner">
                    <img id="avatarImg" src="" alt="Lead Avatar">
                </div>
            </div>
        </div>

        <div class="floating-controls">
            <button onclick="togglePause()" id="pauseBtn" class="btn" title="Pausar Sesión">
                <i id="pauseIcon" class="ph-fill ph-pause"></i>
            </button>

            <button onclick="toggleLive()" id="talkBtn" class="btn active" style="width: 72px; height: 72px; background: var(--accent); margin-top: -10px;" title="Hablar">
                <i id="micIcon" class="ph-fill ph-microphone"></i>
            </button>

            <button onclick="reset()" class="btn" title="Reiniciar">
                <i class="ph ph-arrow-counter-clockwise"></i>
            </button>

            <button onclick="audit()" class="btn" title="Auditoría Final">
                <i class="ph ph-trend-up"></i>
            </button>
        </div>
    </main>

    <!-- RIGHT SIDE -->
    <aside class="sidebar-right">
        
        <div class="metric-group">
            <div class="metric-title">Nivel de Rapport</div>
            <div class="progress-circle-wrap">
                <svg class="progress-svg">
                    <circle class="circle-bg" cx="70" cy="70" r="60"></circle>
                    <circle id="rapportBar" class="circle-bar" cx="70" cy="70" r="60"></circle>
                </svg>
                <div id="rapportValue" class="progress-value">0%</div>
            </div>
        </div>

        <div class="metric-group">
            <div class="metric-title">Progreso Discovery</div>
            <div class="progress-circle-wrap">
                <svg class="progress-svg">
                    <circle class="circle-bg" cx="70" cy="70" r="60"></circle>
                    <circle id="discoveryBar" class="circle-bar" cx="70" cy="70" r="60" style="stroke: #10b981;"></circle>
                </svg>
                <div id="discoveryValue" class="progress-value">0%</div>
            </div>
        </div>

        <div class="metric-group">
            <div class="metric-title">Humor del Prospecto</div>
            <div id="moodTag" class="mood-tag">Neutral</div>
        </div>

        <div class="metric-group">
            <div class="metric-title">Fase E-R-A-N-C</div>
            <div class="eranc-meter">
                <div class="eranc-dot" data-phase="E">E</div>
                <div class="eranc-dot" data-phase="R">R</div>
                <div class="eranc-dot" data-phase="A">A</div>
                <div class="eranc-dot" data-phase="N">N</div>
                <div class="eranc-dot" data-phase="C">C</div>
            </div>
        </div>

    </aside>

    <!-- CONFIG SCREEN -->
    <div id="configScreen" class="screen">
        <div class="config-box">
            <h1 style="font-size: 2.5rem; text-align: center; margin-bottom: 3rem;">Inicia Entrenamiento Pro</h1>
            
            <div class="config-grid">
                <div class="config-card">
                    <h3>Perfil de Lead</h3>
                    <select id="leadType">
                        <option value="random">Aleatorio</option>
                        <option value="ZAFIRO">Zafiro (Dinámico)</option>
                        <option value="PERLA">Perla (Calmado)</option>
                        <option value="ESMERALDA">Esmeralda (Analítico)</option>
                        <option value="RUBÍ">Rubí (Ambicioso)</option>
                    </select>
                </div>
                <div class="config-card">
                    <h3>Motivación / Situación</h3>
                    <select id="leadSit">
                        <option value="random">Cualquiera</option>
                        <option value="ascenso">Ascenso</option>
                        <option value="viajero">Viajes</option>
                        <option value="emigracion">Mudanza</option>
                        <option value="residente">Residente EE.UU.</option>
                    </select>
                </div>
                <div class="config-card">
                    <h3>Objeción Forzada</h3>
                    <select id="leadObj">
                        <option value="random">Aleatoria</option>
                        <option value="pareja">Pareja</option>
                        <option value="dinero">Dinero</option>
                        <option value="pensar">Tiempo/Pensar</option>
                    </select>
                </div>
                <div class="config-card">
                    <h3>País de Origen</h3>
                    <select id="leadCountry">
                        <option value="random">Aleatorio (LATAM)</option>
                        <option value="mexico">México</option>
                        <option value="argentina">Argentina</option>
                        <option value="colombia">Colombia</option>
                    </select>
                </div>
            </div>

            <button class="btn-start" onclick="start()">Comenzar Role-Play</button>
        </div>
    </div>

    <!-- AUDIT SCREEN -->
    <div id="auditScreen" class="screen">
        <div class="config-box" style="background: var(--bg-card); padding: 3rem; border-radius: 32px; border: 1px solid var(--glass-border); max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Auditoría del Coach</h1>
                <button onclick="reset()" class="btn"><i class="ph ph-x"></i></button>
            </div>
            <div id="auditResult" style="white-space: pre-wrap; font-family: 'JetBrains Mono'; color: var(--text-secondary); line-height: 1.8;"></div>
        </div>
    </div>

    <script>
        let clientHistory = [];
        let ident = "";
        let leadData = null;
        let isRec = false;
        let isPaused = false;
        let audio = null;

        // Recognition Setup
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        let rec = SR ? new SR() : null;
        if (rec) {
            rec.lang = "es-AR"; rec.continuous = true;
            rec.onresult = (e) => {
                if (isPaused) return;
                const text = e.results[e.results.length - 1][0].transcript;
                process(text);
            };
            rec.onend = () => { if (isRec && !isPaused) rec.start(); };
        }

        async function start() {
            const config = {
                type: document.getElementById('leadType').value,
                situation: document.getElementById('leadSit').value,
                objection: document.getElementById('leadObj').value,
                country: document.getElementById('leadCountry').value
            };

            const res = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "/start", config })
            });
            const data = await res.json();
            
            leadData = data.lead;
            ident = data.identidad;
            document.getElementById('leadName').innerText = leadData.name;
            document.getElementById('leadDesc').innerText = leadData.desc;
            document.getElementById('configScreen').style.display = 'none';

            updateMetrics(data.metrics);
            addMsg("lead", data.reply);
            clientHistory.push({ role: "assistant", content: data.reply });
            speak(data.reply);

            // Set Avatar
            const seed = leadData.genero === 'mujer' ? 'Sophia' : 'James';
            document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/notionists/svg?seed=${seed}${Math.floor(Math.random()*100)}`;
            
            toggleLive(); // Start mic automatically
        }

        function toggleLive() {
            if (!rec) return;
            const icon = document.getElementById('micIcon');
            const btn = document.getElementById('talkBtn');
            if (!isRec) {
                rec.start(); isRec = true;
                btn.classList.add('active');
                icon.className = "ph-fill ph-circles-three-plus ph-spin";
            } else {
                rec.stop(); isRec = false;
                btn.classList.remove('active');
                icon.className = "ph-fill ph-microphone";
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            const icon = document.getElementById('pauseIcon');
            const avatar = document.getElementById('avatarWrap');

            if (isPaused) {
                if (audio) audio.pause();
                if (rec) rec.stop();
                btn.classList.add('active');
                icon.className = "ph-fill ph-play";
                avatar.classList.add('paused');
            } else {
                if (audio && audio.currentTime > 0) audio.play();
                if (isRec && rec) rec.start();
                btn.classList.remove('active');
                icon.className = "ph-fill ph-pause";
                avatar.classList.remove('paused');
            }
        }

        async function process(text) {
            if (isPaused) return;
            addMsg("user", text);
            
            const res = await fetch("/api/chat", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, historial: clientHistory, identidad: ident })
            });
            const data = await res.json();

            clientHistory.push({ role: "user", content: text });
            clientHistory.push({ role: "assistant", content: data.reply });

            addMsg("lead", data.reply);
            updateMetrics(data.metrics);
            speak(data.reply);
        }

        function updateMetrics(m) {
            if (!m) return;
            // Rapport
            const rOffset = 440 - (440 * m.rapport / 100);
            document.getElementById('rapportBar').style.strokeDashoffset = rOffset;
            document.getElementById('rapportValue').innerText = m.rapport + "%";

            // Discovery
            const dOffset = 440 - (440 * m.discovery / 100);
            document.getElementById('discoveryBar').style.strokeDashoffset = dOffset;
            document.getElementById('discoveryValue').innerText = m.discovery + "%";

            // Mood
            document.getElementById('moodTag').innerText = m.mood;

            // Phase
            document.querySelectorAll('.eranc-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.phase === m.phase);
            });
        }

        async function speak(text) {
            const avatar = document.getElementById('avatarWrap');
            avatar.classList.add('talking');
            
            const res = await fetch("/api/chat", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "/voice", text: text, genero: leadData.genero })
            });
            const data = await res.json();
            
            if (audio) audio.pause();
            audio = new Audio("data:audio/mp3;base64," + data.audio);
            audio.onended = () => avatar.classList.remove('talking');
            if (!isPaused) audio.play();
        }

        function addMsg(role, text) {
            const wrap = document.getElementById('transContent');
            const div = document.createElement('div');
            div.className = `chat-bubble bubble-${role}`;
            div.innerText = text;
            wrap.appendChild(div);
            wrap.scrollTop = wrap.scrollHeight;
        }

        async function audit() {
            document.getElementById('auditScreen').style.display = 'flex';
            const res = await fetch("/api/chat", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: "/audit", historial: clientHistory, leadInfo: leadData })
            });
            const data = await res.json();
            document.getElementById('auditResult').innerText = data.reply;
        }

        function reset() { window.location.reload(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Closers PRO</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

/* IZQUIERDA */
.chat {
  width: 25%;
  background: #020617;
  padding: 15px;
  overflow: hidden;
}

#chatContent {
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform 0.4s;
}

.msg { opacity: 0.5; }
.msg.active { opacity: 1; font-weight: bold; }

/* CENTRO */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.avatar {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
}

.avatar img, .avatar video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ESTADO */
.status {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.7;
}

/* DERECHA */
.audit {
  width: 25%;
  background: #020617;
  padding: 15px;
  overflow-y: auto;
}

/* BOTONES */
.controls {
  position: absolute;
  bottom: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- IZQUIERDA -->
<div class="chat">
  <div id="chatContent"></div>
</div>

<!-- CENTRO -->
<div class="main">

  <div class="avatar">
    <img id="avatarImg">
    <video id="avatarVideo" autoplay muted playsinline style="display:none;"></video>
  </div>

  <div id="status" class="status">Listo</div>

  <div class="controls">
    <button onclick="start()">▶ Start</button>
    <button onclick="reset()">🔄 Reset</button>
    <button onclick="audit()">📊 Audit</button>
    <button onclick="talk()">🎤 Hablar</button>
  </div>
</div>

<!-- DERECHA -->
<div class="audit">
  <h3>Auditoría</h3>
  <div id="auditBox">Sin análisis</div>
</div>

<script>
const chatContent = document.getElementById("chatContent");
const auditBox = document.getElementById("auditBox");
const avatarImg = document.getElementById("avatarImg");
const avatarVideo = document.getElementById("avatarVideo");
const status = document.getElementById("status");

// 🎭 avatar base
avatarImg.src = `https://api.dicebear.com/7.x/notionists/svg?seed=${Math.random()}`;

// 🧾 MENSAJES
function addMsg(text) {
  const div = document.createElement("div");
  div.className = "msg active";
  div.innerText = text;

  document.querySelectorAll(".msg").forEach(m => m.classList.remove("active"));

  chatContent.appendChild(div);

  const total = chatContent.children.length;
  if (total > 6) {
    chatContent.style.transform = `translateY(-${(total-6)*30}px)`;
  }
}

// 🎤 speech recognition
const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
rec.lang = "es-AR";

function talk() {
  try {
    rec.start();
    status.innerText = "Escuchando...";
  } catch {
    console.log("Mic ya activo");
  }
}

rec.onresult = async (e) => {
  const text = e.results[0][0].transcript;

  addMsg("Tú: " + text);
  status.innerText = "Procesando...";

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    const respuesta = data.reply || "Sin respuesta";
    addMsg("Lead: " + respuesta);

    // 🔊 VOZ
    hablar(respuesta);

    // 🎬 VIDEO HEYGEN
    if (data.video) {
      avatarImg.style.display = "none";
      avatarVideo.style.display = "block";
      avatarVideo.src = data.video;
      avatarVideo.play();
    } else {
      avatarVideo.style.display = "none";
      avatarImg.style.display = "block";
    }

    status.innerText = "Tu turno";

  } catch (err) {
    console.error(err);
    status.innerText = "Error";
    addMsg("Error de conexión");
  }
};

// 🔊 VOZ NATURAL
function hablar(texto) {
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = "es-ES";
  u.rate = 0.95;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ▶ START
async function start() {
  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:"/start"})
  });

  const data = await res.json();
  addMsg(data.reply);
}

// 🔄 RESET
async function reset() {
  await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:"/reset"})
  });

  chatContent.innerHTML = "";
  auditBox.innerText = "Sin análisis";

  avatarVideo.style.display = "none";
  avatarImg.style.display = "block";

  status.innerText = "Reiniciado";
}

// 📊 AUDIT
async function audit() {
  status.innerText = "Analizando...";

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:"/audit"})
  });

  const data = await res.json();

  auditBox.innerText = data.audit || "Sin datos";
  status.innerText = "Listo";
}
</script>

</body>
</html>
